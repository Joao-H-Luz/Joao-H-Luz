<svg width="820" height="500" viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');

      .bg  { fill: #0d1117; }
      .bar { fill: #161b22; }

      .ttl { fill: #8b949e; font-family: 'Fira Code', monospace; font-size: 12px; }
      .nm  { fill: #3fb950; font-family: 'Fira Code', monospace; font-size: 12px; font-weight: bold; letter-spacing: 1px; }

      .p   { fill: #3fb950; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .cmd { fill: #e6edf3; font-family: 'Fira Code', monospace; font-size: 13px; }
      .g   { fill: #3fb950; font-family: 'Fira Code', monospace; font-size: 12px; }
      .y   { fill: #d29922; font-family: 'Fira Code', monospace; font-size: 12px; }
      .b   { fill: #58a6ff; font-family: 'Fira Code', monospace; font-size: 12px; }
      .pk  { fill: #f47067; font-family: 'Fira Code', monospace; font-size: 12px; }
      .gr  { fill: #8b949e; font-family: 'Fira Code', monospace; font-size: 12px; }
      .w   { fill: #e6edf3; font-family: 'Fira Code', monospace; font-size: 12px; }

      .px  { fill: #3fb950; font-family: 'Fira Code', monospace; font-size: 13px; }
      .fl  { fill: #d29922; font-family: 'Fira Code', monospace; font-size: 13px; }
      .fl2 { fill: #f47067; font-family: 'Fira Code', monospace; font-size: 13px; }

      .cur { fill: #58a6ff; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* left panel */
      .l0  { opacity:0; animation: fi .25s  .2s forwards; }
      .l1  { opacity:0; animation: fi .25s  .4s forwards; }
      .l2  { opacity:0; animation: fi .25s  .6s forwards; }
      .l3  { opacity:0; animation: fi .25s  .8s forwards; }
      .l4  { opacity:0; animation: fi .25s 1.0s forwards; }
      .l5  { opacity:0; animation: fi .25s 1.3s forwards; }
      .l6  { opacity:0; animation: fi .25s 1.6s forwards; }
      .l7  { opacity:0; animation: fi .25s 1.9s forwards; }
      .l8  { opacity:0; animation: fi .25s 2.1s forwards; }
      .l9  { opacity:0; animation: fi .25s 2.3s forwards; }
      .l10 { opacity:0; animation: fi .25s 2.5s forwards; }
      .l11 { opacity:0; animation: fi .25s 2.7s forwards; }
      .l12 { opacity:0; animation: fi .25s 2.9s forwards; }
      .l13 { opacity:0; animation: fi .25s 3.1s forwards; }
      .l14 { opacity:0; animation: fi .25s 3.3s forwards; }
      .l15 { opacity:0; animation: fi .25s 3.5s forwards; }
      .l16 { opacity:0; animation: fi .25s 3.7s forwards; }
      .l17 { opacity:0; animation: fi .25s 3.9s forwards; }
      .l18 { opacity:0; animation: fi .25s 4.1s forwards; }
      .l19 { opacity:0; animation: fi .25s 4.3s forwards; }
      .l20 { opacity:0; animation: fi .25s 4.5s forwards; }
      .l21 { opacity:0; animation: fi .25s 4.7s forwards; }

      /* right panel — rocket scan-lines */
      .r0  { opacity:0; animation: fi .15s  .3s forwards; }
      .r1  { opacity:0; animation: fi .15s  .6s forwards; }
      .r2  { opacity:0; animation: fi .15s  .9s forwards; }
      .r3  { opacity:0; animation: fi .15s 1.2s forwards; }
      .r4  { opacity:0; animation: fi .15s 1.5s forwards; }
      .r5  { opacity:0; animation: fi .15s 1.8s forwards; }
      .r6  { opacity:0; animation: fi .15s 2.1s forwards; }
      .r7  { opacity:0; animation: fi .15s 2.4s forwards; }
      .r8  { opacity:0; animation: fi .15s 2.7s forwards; }
      .r9  { opacity:0; animation: fi .15s 3.0s forwards; }
      .r10 { opacity:0; animation: fi .15s 3.3s forwards; }
      .r11 { opacity:0; animation: fi .15s 3.6s forwards; }
      .r12 { opacity:0; animation: fi .15s 3.9s forwards; }
      .r13 { opacity:0; animation: fi .15s 4.2s forwards; }
      .r14 { opacity:0; animation: fi .15s 4.5s forwards; }
      .r15 { opacity:0; animation: fi .15s 4.8s forwards; }
      .r16 { opacity:0; animation: fi .15s 5.1s forwards; }
      .r17 { opacity:0; animation: fi .15s 5.4s forwards; }
      .r18 { opacity:0; animation: fi .15s 5.7s forwards; }
      .r19 { opacity:0; animation: fi .15s 6.0s forwards; }
      .r20 { opacity:0; animation: fi .15s 6.3s forwards; }
      .r21 { opacity:0; animation: fi .15s 6.6s forwards; }
      .r22 { opacity:0; animation: fi .15s 6.9s forwards; }

      /* flame flicker — starts after rocket is drawn */
      .flame {
        animation: flicker .35s 5.5s ease-in-out infinite alternate;
      }
      @keyframes flicker {
        0%   { opacity: 1.0; transform: scaleY(1.00); }
        33%  { opacity: 0.7; transform: scaleY(0.92); }
        66%  { opacity: 0.9; transform: scaleY(1.05); }
        100% { opacity: 0.6; transform: scaleY(0.88); }
      }

      @keyframes fi { from{opacity:0} to{opacity:1} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="500" rx="12" class="bg"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="820" height="36" rx="12" class="bar"/>
  <rect x="0" y="18" width="820" height="18" class="bar"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>
  <text x="410" y="23" text-anchor="middle" class="ttl">joao@pucrs: ~</text>

  <!-- Divider -->
  <line x1="468" y1="36" x2="468" y2="500" stroke="#30363d" stroke-width="1.5"/>

  <!-- ════ LEFT PANEL ════ -->

  <!--
    JOAO in pixel-art block letters using only ▓ and spaces.
    J has a horizontal bar on TOP (traço encima).

    J:  ▓▓▓▓    O:  ▓▓▓    A:   ▓     O:  ▓▓▓
          ▓        ▓   ▓       ▓ ▓       ▓   ▓
          ▓        ▓   ▓      ▓▓▓▓▓      ▓   ▓
        ▓ ▓        ▓   ▓      ▓   ▓      ▓   ▓
         ▓▓         ▓▓▓       ▓   ▓       ▓▓▓
  -->
  <g class="l0"><text x="16" y="58"  class="nm">▓▓▓▓    ▓▓▓     ▓    ▓▓▓ </text></g>
  <g class="l1"><text x="16" y="72"  class="nm">  ▓    ▓   ▓   ▓ ▓  ▓   ▓</text></g>
  <g class="l2"><text x="16" y="86"  class="nm">  ▓    ▓   ▓  ▓▓▓▓▓ ▓   ▓</text></g>
  <g class="l3"><text x="16" y="100" class="nm">▓ ▓    ▓   ▓  ▓   ▓ ▓   ▓</text></g>
  <g class="l4"><text x="16" y="114" class="nm"> ▓▓     ▓▓▓   ▓   ▓  ▓▓▓ </text></g>

  <!-- Separator -->
  <g class="l5"><text x="16" y="131" class="gr">──────────────────────────────────────────</text></g>

  <!-- whoami -->
  <g class="l6">
    <text x="16" y="149">
      <tspan class="p">joao@pucrs</tspan><tspan class="w">:</tspan><tspan class="b">~</tspan><tspan class="w"> $ </tspan><tspan class="cmd">whoami</tspan>
    </text>
  </g>
  <g class="l7"><text x="16" y="165" class="w">→  João Henrique  |  Data Science &amp; AI @ PUCRS</text></g>

  <!-- cat skills.txt -->
  <g class="l8">
    <text x="16" y="184">
      <tspan class="p">joao@pucrs</tspan><tspan class="w">:</tspan><tspan class="b">~</tspan><tspan class="w"> $ </tspan><tspan class="cmd">cat skills.txt</tspan>
    </text>
  </g>
  <g class="l9" ><text x="16" y="199"><tspan class="y"> [AI/ML] </tspan><tspan class="w">Machine Learning · Deep Learning · NLP</tspan></text></g>
  <g class="l10"><text x="16" y="214"><tspan class="y"> [Data]  </tspan><tspan class="w">Python · Pandas · SQL · Análise Preditiva</tspan></text></g>
  <g class="l11"><text x="16" y="229"><tspan class="y"> [Infra] </tspan><tspan class="w">MLOps · Docker · Cloud Deploy</tspan></text></g>

  <!-- ls projetos/ -->
  <g class="l12">
    <text x="16" y="248">
      <tspan class="p">joao@pucrs</tspan><tspan class="w">:</tspan><tspan class="b">~</tspan><tspan class="w"> $ </tspan><tspan class="cmd">ls projetos/</tspan>
    </text>
  </g>
  <g class="l13"><text x="16" y="263"><tspan class="b">drwx </tspan><tspan class="w">App_Leitor_NFs    </tspan><tspan class="gr">→ Leitor de NFs p/ .xlsx</tspan></text></g>
  <g class="l14"><text x="16" y="278"><tspan class="b">drwx </tspan><tspan class="w">ALEST_II-Projetos </tspan><tspan class="gr">→ Estruturas de Dados</tspan></text></g>
  <g class="l15"><text x="16" y="293"><tspan class="b">drwx </tspan><tspan class="w">T-1_ALEST_II      </tspan><tspan class="gr">→ Processamento em nuvem</tspan></text></g>

  <!-- cat contato.json -->
  <g class="l16">
    <text x="16" y="312">
      <tspan class="p">joao@pucrs</tspan><tspan class="w">:</tspan><tspan class="b">~</tspan><tspan class="w"> $ </tspan><tspan class="cmd">cat contato.json</tspan>
    </text>
  </g>
  <g class="l17"><text x="16" y="327" class="pk">{</text></g>
  <g class="l18"><text x="16" y="342"><tspan class="gr">  "linkedin": </tspan><tspan class="g">"linkedin.com/in/joaohenriqueluz"</tspan><tspan class="w">,</tspan></text></g>
  <g class="l19"><text x="16" y="357"><tspan class="gr">  "email"   : </tspan><tspan class="g">"joaohluz13@gmail.com"</tspan></text></g>
  <g class="l20"><text x="16" y="372" class="pk">}</text></g>

  <!-- separator + prompt -->
  <g class="l21"><text x="16" y="391" class="gr">──────────────────────────────────────────</text></g>
  <g class="l21">
    <text x="16" y="409"><tspan class="p">joao@pucrs</tspan><tspan class="w">:</tspan><tspan class="b">~</tspan><tspan class="w"> $ </tspan></text>
    <rect x="115" y="396" width="8" height="14" class="cur"/>
  </g>


  <!-- ════ RIGHT PANEL — ROCKET ════ -->

  <!-- Title bar -->
  <rect x="468" y="36" width="352" height="28" fill="#161b22"/>
  <text x="644" y="54" text-anchor="middle" class="ttl">~/rocket.ascii</text>
  <line x1="468" y1="64" x2="820" y2="64" stroke="#30363d" stroke-width="1"/>

  <!--
    ROCKET pixel art — nose up, body, fins, flame
    Centered in 352px panel (x=468..820), center=644
    Each row ~21 chars × 7.8px = 163px → x = 644 - 82 = 562
    Row spacing: 14px, starting y=82
  -->

  <!-- nose tip -->
  <g class="r0" ><text x="562" y="82"  class="px">         ▒         </text></g>
  <!-- nose cone -->
  <g class="r1" ><text x="562" y="96"  class="px">        ▓▓▓        </text></g>
  <g class="r2" ><text x="562" y="110" class="px">       ▓▓▓▓▓       </text></g>
  <!-- porthole / window -->
  <g class="r3" ><text x="562" y="124" class="px">       ▓▒▒▒▓       </text></g>
  <g class="r4" ><text x="562" y="138" class="px">       ▓▒░▒▓       </text></g>
  <g class="r5" ><text x="562" y="152" class="px">       ▓▒▒▒▓       </text></g>
  <!-- body -->
  <g class="r6" ><text x="562" y="166" class="px">       ▓▓▓▓▓       </text></g>
  <g class="r7" ><text x="562" y="180" class="px">       ▓▓▓▓▓       </text></g>
  <g class="r8" ><text x="562" y="194" class="px">      ▓▓▓▓▓▓▓      </text></g>
  <!-- fins spreading -->
  <g class="r9" ><text x="562" y="208" class="px">    ▓▓▓▓▓▓▓▓▓▓▓    </text></g>
  <g class="r10"><text x="562" y="222" class="px">   ▓▓▓░▓▓▓▓▓░▓▓▓   </text></g>
  <g class="r11"><text x="562" y="236" class="px">   ▓▓▓░░░░░░░▓▓▓   </text></g>
  <!-- nozzle -->
  <g class="r12"><text x="562" y="250" class="px">    ▒▒▓▓▓▓▓▒▒▒     </text></g>
  <g class="r13"><text x="562" y="264" class="px">      ▒▓▓▓▒▒       </text></g>

  <!-- FLAMES — flickering after appearing -->
  <g class="r14">
    <text x="562" y="278" class="fl flame">       ▓▒▓▒▓       </text>
  </g>
  <g class="r15">
    <text x="562" y="292" class="fl flame">      ▒▓░░░▓▒      </text>
  </g>
  <g class="r16">
    <text x="562" y="306" class="fl2 flame">     ░▒░░░░░▒░     </text>
  </g>
  <g class="r17">
    <text x="562" y="320" class="fl2 flame">      ░░░░░░░      </text>
  </g>
  <g class="r18">
    <text x="562" y="334" class="fl2 flame">       ░░░░░       </text>
  </g>

  <!-- Status box -->
  <g class="r19"><text x="548" y="358" class="gr">  ┌────────────────────┐</text></g>
  <g class="r20">
    <text x="548" y="373">
      <tspan class="gr">  │ </tspan><tspan class="g">$ python train.py    </tspan><tspan class="gr">│</tspan>
    </text>
  </g>
  <g class="r21">
    <text x="548" y="388">
      <tspan class="gr">  │ </tspan><tspan class="y">▓▓▓▓▓▓▓▒░░  </tspan><tspan class="w">78%   </tspan><tspan class="gr">│</tspan>
    </text>
  </g>
  <g class="r22"><text x="548" y="403" class="gr">  └────────────────────┘</text></g>

  <!-- Online indicator -->
  <g class="r22">
    <circle cx="558" cy="426" r="5" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="570" y="430" class="g"> status: online · launching...</text>
  </g>

</svg>
