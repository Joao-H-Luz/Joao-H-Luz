<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');

      .window-shadow { filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)); }
      .terminal-bg { fill: #0d1117; }
      .mac-bar { fill: #21262d; rx: 10; }
      
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #28c840; }
      
      .title-text { fill: #8b949e; font-family: 'Fira Code', monospace; font-size: 12px; }

      .neon-blue { 
        fill: #58a6ff; 
        font-family: 'Fira Code', monospace; 
        font-size: 14px; 
        font-weight: bold;
        filter: drop-shadow(0 0 5px #58a6ff);
      }

      .prompt { fill: #58a6ff; font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; }
      .cmd    { fill: #e6edf3; font-family: 'Fira Code', monospace; font-size: 13px; }
      .green  { fill: #3fb950; font-family: 'Fira Code', monospace; font-size: 13px; }
      .yellow { fill: #d29922; font-family: 'Fira Code', monospace; font-size: 13px; }
      .blue   { fill: #58a6ff; font-family: 'Fira Code', monospace; font-size: 13px; }
      .pink   { fill: #f47067; font-family: 'Fira Code', monospace; font-size: 13px; }
      .gray   { fill: #8b949e; font-family: 'Fira Code', monospace; font-size: 13px; }
      .white  { fill: #e6edf3; font-family: 'Fira Code', monospace; font-size: 13px; }

      .cursor { fill: #58a6ff; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

      .line { opacity: 0; animation: fadein 0.3s forwards; }
      @keyframes fadein {
        from { opacity: 0; transform: translateX(-5px); }
        to   { opacity: 1; transform: translateX(0); }
      }
    </style>
  </defs>

  <g class="window-shadow">
    <rect width="800" height="520" rx="10" class="terminal-bg"/>

    <rect width="800" height="38" rx="10" class="mac-bar"/>
    <rect y="25" width="800" height="13" fill="#21262d"/>

    <circle cx="20" cy="19" r="6" class="dot-red"/>
    <circle cx="40" cy="19" r="6" class="dot-yellow"/>
    <circle cx="60" cy="19" r="6" class="dot-green"/>
    <text x="400" y="24" text-anchor="middle" class="title-text">henrique@pucrs: ~</text>

    <g class="line" style="animation-delay: 0.2s">
      <text x="24" y="80" class="neon-blue" xml:space="preserve">
        <tspan x="24" dy="0">  _   _ _____ _   _ ____  ___ ___  _   _ _____</tspan>
        <tspan x="24" dy="15"> | | | | ____| \ | |  _ \|_ _/ _ \| | | | ____|</tspan>
        <tspan x="24" dy="15"> | |_| |  _| |  \| | |_) || | | | | | | |  _|  </tspan>
        <tspan x="24" dy="15"> |  _  | |___| |\  |  _ &lt; | | |_| | |_| | |___ </tspan>
        <tspan x="24" dy="15"> |_| |_|_____|_| \_|_| \_\___\__\_\\___/|_____|</tspan>
      </text>
    </g>

    <g class="line" style="animation-delay: 0.5s">
      <text x="24" y="165" class="gray">──────────────────────────────────────────────────────────────</text>
    </g>

    <g class="line" style="animation-delay: 0.8s">
      <text x="24" y="190"><tspan class="green">henrique@pucrs</tspan><tspan class="white">:</tspan><tspan class="blue">~</tspan><tspan class="white"> $ </tspan><tspan class="cmd">whoami</tspan></text>
      <text x="24" y="207" class="white">→ João Henrique da Luz | Data Science &amp; AI @ PUCRS</text>
    </g>

    <g class="line" style="animation-delay: 1.2s">
      <text x="24" y="230"><tspan class="green">henrique@pucrs</tspan><tspan class="white">:</tspan><tspan class="blue">~</tspan><tspan class="white"> $ </tspan><tspan class="cmd">cat skills.txt</tspan></text>
      <text x="24" y="247"><tspan class="yellow"> [AI/ML]</tspan><tspan class="white"> Machine Learning · Deep Learning · NLP</tspan></text>
      <text x="24" y="263"><tspan class="yellow"> [Data] </tspan><tspan class="white"> Python · Pandas · SQL · Análise Preditiva</tspan></text>
      <text x="24" y="279"><tspan class="yellow"> [Infra]</tspan><tspan class="white"> MLOps · Docker · Cloud Deploy</tspan></text>
    </g>

    <g class="line" style="animation-delay: 1.8s">
      <text x="24" y="305"><tspan class="green">henrique@pucrs</tspan><tspan class="white">:</tspan><tspan class="blue">~</tspan><tspan class="white"> $ </tspan><tspan class="cmd">ls -la projetos/</tspan></text>
      <text x="24" y="322"><tspan class="blue">drwxr-xr-x</tspan><tspan class="white"> App_Leitor_NFs</tspan><tspan class="gray">      → Leitor p/ .xlsx</tspan></text>
      <text x="24" y="338"><tspan class="blue">drwxr-xr-x</tspan><tspan class="white"> ALEST_II-Projetos</tspan><tspan class="gray">   → Estruturas Dados</tspan></text>
      <text x="24" y="354"><tspan class="blue">drwxr-xr-x</tspan><tspan class="white"> T-1_ALEST_II</tspan><tspan class="gray">        → Nuvem/Cloud</tspan></text>
    </g>

    <g class="line" style="animation-delay: 2.4s">
      <text x="24" y="385"><tspan class="green">henrique@pucrs</tspan><tspan class="white">:</tspan><tspan class="blue">~</tspan><tspan class="white"> $ </tspan><tspan class="cmd">cat contato.json</tspan></text>
      <text x="24" y="402" class="pink">{</text>
      <text x="24" y="418" class="gray">   "linkedin": <tspan class="green">"in/joaohenriqueluz"</tspan>,</text>
      <text x="24" y="434" class="gray">   "email":    <tspan class="green">"joaohluz13@gmail.com"</tspan></text>
      <text x="24" y="450" class="pink">}</text>
    </g>

    <g class="line" style="animation-delay: 3.3s">
      <text x="24" y="485"><tspan class="green">henrique@pucrs</tspan><tspan class="white">:</tspan><tspan class="blue">~</tspan><tspan class="white"> $ </tspan></text>
      <rect x="145" y="472" width="9" height="15" class="cursor"/>
    </g>
  </g>
</svg>
